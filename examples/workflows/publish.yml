# Publish to PyPI when a version tag is pushed.
# Set repository secret PYPI_API_TOKEN (PyPI API token with upload scope).
name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_API_TOKEN not configured — skipping upload. Artifacts left in dist/."
            ls -la dist/
            exit 0
          fi
          pip install twine
          twine upload dist/*
